<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Calibri, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0F1629" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" fill="#FFFFFF" font-size="20" font-weight="bold" text-anchor="middle">AdaptiveDrive AI - System Architecture</text>

  <!-- Browser Section -->
  <rect x="20" y="50" width="860" height="380" rx="10" fill="#1A2332" stroke="#334155" stroke-width="1.5"/>
  <text x="40" y="75" fill="#94A3B8" font-size="13" font-weight="bold">USER'S BROWSER (Chrome)</text>

  <!-- Input: Webcam -->
  <rect x="40" y="95" width="140" height="65" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="40" y="95" width="140" height="4" rx="2" fill="#3B82F6"/>
  <text x="110" y="120" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Webcam</text>
  <text x="110" y="136" fill="#94A3B8" font-size="10" text-anchor="middle">Camera Input</text>

  <!-- Input: Microphone -->
  <rect x="40" y="175" width="140" height="65" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="40" y="175" width="140" height="4" rx="2" fill="#3B82F6"/>
  <text x="110" y="200" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Microphone</text>
  <text x="110" y="216" fill="#94A3B8" font-size="10" text-anchor="middle">16kHz PCM Audio</text>

  <!-- Arrow: Webcam to MediaPipe -->
  <line x1="180" y1="127" x2="210" y2="127" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#60A5FA"/></marker></defs>

  <!-- MediaPipe Hands -->
  <rect x="215" y="90" width="160" height="75" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="215" y="90" width="160" height="4" rx="2" fill="#2DD4BF"/>
  <text x="295" y="118" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">MediaPipe Hands</text>
  <text x="295" y="134" fill="#94A3B8" font-size="10" text-anchor="middle">WASM, 20-frame calibration</text>
  <text x="295" y="148" fill="#94A3B8" font-size="10" text-anchor="middle">EMA smoothing</text>

  <!-- Arrow: MediaPipe to Hand State -->
  <line x1="375" y1="127" x2="405" y2="127" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <defs><marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2DD4BF"/></marker></defs>

  <!-- Hand State -->
  <rect x="410" y="85" width="150" height="85" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="410" y="85" width="150" height="4" rx="2" fill="#FBBF24"/>
  <text x="485" y="110" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Hand State</text>
  <text x="485" y="126" fill="#94A3B8" font-size="10" text-anchor="middle">Throttle / Brake %</text>
  <text x="485" y="140" fill="#94A3B8" font-size="10" text-anchor="middle">Steering (-1 to 1)</text>
  <text x="485" y="154" fill="#94A3B8" font-size="10" text-anchor="middle">Speed (mph)</text>

  <!-- Gemini Live API (center) -->
  <rect x="215" y="195" width="345" height="85" rx="10" fill="#1E293B" filter="url(#shadow)" stroke="#3B82F6" stroke-width="2"/>
  <text x="387" y="222" fill="#3B82F6" font-size="14" font-weight="bold" text-anchor="middle">Gemini Live API</text>
  <text x="387" y="240" fill="#FFFFFF" font-size="11" text-anchor="middle">gemini-2.5-flash-native-audio-preview-12-2025</text>
  <text x="387" y="256" fill="#94A3B8" font-size="10" text-anchor="middle">WebSocket | Bidirectional Audio | System Data every 2s</text>
  <text x="387" y="270" fill="#94A3B8" font-size="10" text-anchor="middle">Receives: speed, steering, distance, phase, targets</text>

  <!-- Arrow: Mic to Gemini -->
  <line x1="180" y1="207" x2="215" y2="225" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="188" y="204" fill="#60A5FA" font-size="8">Audio In</text>

  <!-- Arrow: Hand State to Gemini -->
  <line x1="485" y1="170" x2="485" y2="195" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <defs><marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#FBBF24"/></marker></defs>
  <text x="500" y="186" fill="#FBBF24" font-size="8">Data</text>

  <!-- Three.js Scene -->
  <rect x="590" y="85" width="270" height="100" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="590" y="85" width="270" height="4" rx="2" fill="#34D399"/>
  <text x="725" y="112" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Three.js Driving Scene</text>
  <text x="725" y="128" fill="#94A3B8" font-size="10" text-anchor="middle">Car, road, oncoming traffic (60fps)</text>
  <text x="725" y="142" fill="#94A3B8" font-size="10" text-anchor="middle">Traffic light (green/yellow/red)</text>
  <text x="725" y="156" fill="#94A3B8" font-size="10" text-anchor="middle">Trees, buildings, street lights</text>

  <!-- Arrow: Hand State to Scene -->
  <line x1="560" y1="127" x2="590" y2="127" stroke="#34D399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#34D399"/></marker></defs>

  <!-- AI Coach Panel -->
  <rect x="40" y="300" width="240" height="110" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="40" y="300" width="240" height="4" rx="2" fill="#60A5FA"/>
  <text x="160" y="328" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">AI Coach Panel</text>
  <text x="160" y="344" fill="#94A3B8" font-size="10" text-anchor="middle">Voice playback (24kHz, gapless)</text>
  <text x="160" y="358" fill="#94A3B8" font-size="10" text-anchor="middle">Mic toggle, connection status</text>
  <text x="160" y="372" fill="#94A3B8" font-size="10" text-anchor="middle">Real-time spoken coaching</text>

  <!-- Arrow: Gemini to Coach -->
  <line x1="300" y1="280" x2="200" y2="300" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="235" y="286" fill="#60A5FA" font-size="8">Voice Out</text>

  <!-- Practice System -->
  <rect x="310" y="300" width="240" height="110" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="310" y="300" width="240" height="4" rx="2" fill="#FBBF24"/>
  <text x="430" y="328" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Practice + Scenario System</text>
  <text x="430" y="344" fill="#94A3B8" font-size="10" text-anchor="middle">Progressive checklist training</text>
  <text x="430" y="358" fill="#94A3B8" font-size="10" text-anchor="middle">Speed targets (40 / 10 / 60 mph)</text>
  <text x="430" y="372" fill="#94A3B8" font-size="10" text-anchor="middle">Traffic light scenario</text>

  <!-- Dashboard -->
  <rect x="590" y="200" width="270" height="90" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="590" y="200" width="270" height="4" rx="2" fill="#F87171"/>
  <text x="725" y="225" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Dashboard</text>
  <text x="725" y="241" fill="#94A3B8" font-size="10" text-anchor="middle">Speed, throttle %, brake %</text>
  <text x="725" y="255" fill="#94A3B8" font-size="10" text-anchor="middle">Mode, phase, distance to light</text>
  <text x="725" y="269" fill="#94A3B8" font-size="10" text-anchor="middle">Steering indicator</text>

  <!-- Arrow: Gemini to Practice -->
  <line x1="430" y1="280" x2="430" y2="300" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <!-- Divider line -->
  <line x1="20" y1="445" x2="880" y2="445" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="462" fill="#60A5FA" font-size="11" font-weight="bold" text-anchor="middle">HTTPS (port 8080)</text>

  <!-- Google Cloud Section -->
  <rect x="20" y="475" width="860" height="130" rx="10" fill="#1A2332" stroke="#334155" stroke-width="1.5"/>
  <text x="40" y="500" fill="#94A3B8" font-size="13" font-weight="bold">GOOGLE CLOUD</text>

  <!-- Cloud Run -->
  <rect x="40" y="510" width="260" height="80" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="40" y="510" width="260" height="4" rx="2" fill="#3B82F6"/>
  <text x="170" y="535" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Cloud Run</text>
  <text x="170" y="551" fill="#94A3B8" font-size="10" text-anchor="middle">Node.js 20 + Express</text>
  <text x="170" y="565" fill="#94A3B8" font-size="10" text-anchor="middle">Serves React SPA + /api/health</text>
  <text x="170" y="579" fill="#94A3B8" font-size="10" text-anchor="middle">Min 1 instance, auto-scaling</text>

  <!-- Cloud Build -->
  <rect x="330" y="510" width="230" height="80" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="330" y="510" width="230" height="4" rx="2" fill="#34D399"/>
  <text x="445" y="535" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Cloud Build</text>
  <text x="445" y="551" fill="#94A3B8" font-size="10" text-anchor="middle">Multi-stage Docker build</text>
  <text x="445" y="565" fill="#94A3B8" font-size="10" text-anchor="middle">API key injected at build time</text>
  <text x="445" y="579" fill="#94A3B8" font-size="10" text-anchor="middle">cloudbuild.yaml + deploy.sh</text>

  <!-- Artifact Registry -->
  <rect x="590" y="510" width="270" height="80" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="590" y="510" width="270" height="4" rx="2" fill="#FBBF24"/>
  <text x="725" y="535" fill="#FFFFFF" font-size="12" font-weight="bold" text-anchor="middle">Artifact Registry</text>
  <text x="725" y="551" fill="#94A3B8" font-size="10" text-anchor="middle">Container image storage</text>
  <text x="725" y="565" fill="#94A3B8" font-size="10" text-anchor="middle">us-central1-docker.pkg.dev</text>

  <!-- Arrows between cloud services -->
  <line x1="300" y1="550" x2="330" y2="550" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="560" y1="550" x2="590" y2="550" stroke="#FBBF24" stroke-width="1.5" marker-end="url(#arrowYellow)"/>
</svg>
